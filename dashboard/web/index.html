<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Líder Dashboard - NexusAuto</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #e4e4e4;
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    
    header {
      text-align: center;
      margin-bottom: 40px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      backdrop-filter: blur(10px);
    }
    
    header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    header p {
      color: #888;
      font-size: 1.1rem;
    }
    
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    
    .metric-card {
      background: rgba(255, 255, 255, 0.05);
      padding: 25px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    
    .metric-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0, 217, 255, 0.2);
    }
    
    .metric-card h3 {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .metric-card .value {
      font-size: 2.5rem;
      font-weight: bold;
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .metric-card .delta {
      font-size: 0.85rem;
      margin-top: 8px;
      color: #00ff88;
    }
    
    .metric-card .delta.negative {
      color: #ff4757;
    }
    
    .section {
      background: rgba(255, 255, 255, 0.05);
      padding: 25px;
      border-radius: 12px;
      margin-bottom: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .section h2 {
      font-size: 1.5rem;
      margin-bottom: 20px;
      color: #00d9ff;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .section h2::before {
      content: '📊';
      font-size: 1.8rem;
    }
    
    .agents-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
    }
    
    .agent-card {
      background: rgba(255, 255, 255, 0.03);
      padding: 15px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .agent-card .name {
      font-weight: 600;
      color: #fff;
    }
    
    .agent-card .status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    .agent-card .status.idle {
      background: rgba(0, 217, 255, 0.2);
      color: #00d9ff;
    }
    
    .agent-card .status.busy {
      background: rgba(255, 166, 0, 0.2);
      color: #ffa600;
    }
    
    .agent-card .tasks-count {
      font-size: 0.85rem;
      color: #888;
    }
    
    .tasks-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 400px;
      overflow-y: auto;
    }
    
    .task-item {
      background: rgba(255, 255, 255, 0.03);
      padding: 15px;
      border-radius: 8px;
      border-left: 4px solid #888;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
    }
    
    .task-item.pending {
      border-left-color: #ffa600;
    }
    
    .task-item.in_progress {
      border-left-color: #00d9ff;
    }
    
    .task-item.completed {
      border-left-color: #00ff88;
      opacity: 0.6;
    }
    
    .task-item .description {
      flex: 1;
      font-size: 0.9rem;
    }
    
    .task-item .area {
      font-size: 0.75rem;
      color: #888;
      background: rgba(255, 255, 255, 0.05);
      padding: 4px 8px;
      border-radius: 4px;
    }
    
    .task-item .status-badge {
      font-size: 0.7rem;
      padding: 4px 8px;
      border-radius: 4px;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    .status-badge.pending {
      background: rgba(255, 166, 0, 0.2);
      color: #ffa600;
    }
    
    .status-badge.in_progress {
      background: rgba(0, 217, 255, 0.2);
      color: #00d9ff;
    }
    
    .status-badge.completed {
      background: rgba(0, 255, 136, 0.2);
      color: #00ff88;
    }
    
    .vv-chart {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    
    .vv-bar {
      flex: 1;
      min-width: 150px;
      background: rgba(255, 255, 255, 0.03);
      padding: 15px;
      border-radius: 8px;
      text-align: center;
    }
    
    .vv-bar .level {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 8px;
    }
    
    .vv-bar .count {
      font-size: 2rem;
      font-weight: bold;
    }
    
    .vv-bar.level1 .count {
      color: #ff4757;
    }
    
    .vv-bar.level2 .count {
      color: #ffa600;
    }
    
    .vv-bar.level3 .count {
      color: #00ff88;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #888;
    }
    
    .loading::after {
      content: '';
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #888;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 10px;
      vertical-align: middle;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .refresh-btn {
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      color: #1a1a2e;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      margin-bottom: 20px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    
    .refresh-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(0, 217, 255, 0.4);
    }
    
    .last-update {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 20px;
    }
    
    .handoffs-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 300px;
      overflow-y: auto;
    }
    
    .handoff-item {
      background: rgba(255, 255, 255, 0.03);
      padding: 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .handoff-item .arrow {
      color: #00d9ff;
      font-weight: bold;
    }
    
    .handoff-item .time {
      color: #888;
      font-size: 0.75rem;
      margin-left: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🚀 Líder Dashboard</h1>
      <p>Orquestração de Agentes em Tempo Real</p>
    </header>
    
    <button class="refresh-btn" onclick="refreshData()">🔄 Atualizar Dados</button>
    <div class="last-update" id="lastUpdate">Última atualização: --</div>
    
    <div id="loading" class="loading">Carregando dados</div>
    
    <div id="dashboard" style="display: none;">
      <!-- Métricas Principais -->
      <div class="metrics-grid">
        <div class="metric-card">
          <h3>Total de Tarefas</h3>
          <div class="value" id="totalTasks">0</div>
          <div class="delta" id="tasksDelta">+0 hoje</div>
        </div>
        <div class="metric-card">
          <h3>Tarefas Concluídas</h3>
          <div class="value" id="completedTasks">0</div>
          <div class="delta" id="completionRate">0% taxa</div>
        </div>
        <div class="metric-card">
          <h3>Agentes Ativos</h3>
          <div class="value" id="activeAgents">0</div>
          <div class="delta" id="totalAgents">/ 0 totais</div>
        </div>
        <div class="metric-card">
          <h3>Cache Hit Rate</h3>
          <div class="value" id="cacheHitRate">0%</div>
          <div class="delta" id="cacheDelta">~0 tokens economizados</div>
        </div>
      </div>
      
      <!-- Agentes -->
      <div class="section">
        <h2>Agentes</h2>
        <div class="agents-grid" id="agentsGrid"></div>
      </div>
      
      <!-- Tarefas -->
      <div class="section">
        <h2>Tarefas Recentes</h2>
        <div class="tasks-list" id="tasksList"></div>
      </div>
      
      <!-- V&V Stats -->
      <div class="section">
        <h2>Validações V&V</h2>
        <div class="vv-chart" id="vvChart"></div>
      </div>
      
      <!-- Handoffs -->
      <div class="section">
        <h2>Handoffs Recentes</h2>
        <div class="handoffs-list" id="handoffsList"></div>
      </div>
    </div>
  </div>
  
  <script>
    const API_BASE = 'http://localhost:3001';
    
    async function fetchJSON(endpoint) {
      try {
        const res = await fetch(`${API_BASE}${endpoint}`);
        return await res.json();
      } catch (error) {
        console.error(`Error fetching ${endpoint}:`, error);
        return null;
      }
    }
    
    async function refreshData() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('dashboard').style.display = 'none';
      
      try {
        // Fetch all data
        const [tasks, agents, metrics, handoffs] = await Promise.all([
          fetchJSON('/api/tasks'),
          fetchJSON('/api/agents'),
          fetchJSON('/api/metrics'),
          fetchJSON('/api/handoffs')
        ]);
        
        // Update metrics
        if (tasks) {
          document.getElementById('totalTasks').textContent = tasks.total;
          document.getElementById('completedTasks').textContent = tasks.byStatus.completed;
          document.getElementById('tasksDelta').textContent = `+${tasks.byStatus.in_progress} em progresso`;
          
          const rate = tasks.total > 0 ? ((tasks.byStatus.completed / tasks.total) * 100).toFixed(1) : 0;
          document.getElementById('completionRate').textContent = `${rate}% taxa`;
          
          // Update tasks list
          const tasksList = document.getElementById('tasksList');
          tasksList.innerHTML = tasks.tasks.slice(0, 20).map(task => `
            <div class="task-item ${task.status}">
              <span class="area">${task.area}</span>
              <span class="description">${task.description}</span>
              <span class="status-badge ${task.status}">${task.status.replace('_', ' ')}</span>
            </div>
          `).join('');
        }
        
        if (agents) {
          document.getElementById('activeAgents').textContent = agents.active;
          document.getElementById('totalAgents').textContent = `/ ${agents.total} totais`;
          
          // Update agents grid
          const agentsGrid = document.getElementById('agentsGrid');
          agentsGrid.innerHTML = agents.agents.map(agent => `
            <div class="agent-card">
              <span class="name">${agent.name}</span>
              <span class="status ${agent.status}">${agent.status}</span>
              <span class="tasks-count">${agent.tasks} tarefas</span>
            </div>
          `).join('');
        }
        
        if (metrics) {
          document.getElementById('cacheHitRate').textContent = 
            `${(metrics.performance.cacheHitRate || 0).toFixed(1)}%`;
          
          // Update V&V chart
          const vvChart = document.getElementById('vvChart');
          vvChart.innerHTML = `
            <div class="vv-bar level1">
              <div class="level">🔴 Nível 1 (Crítico)</div>
              <div class="count">${metrics.vv.level1Count || 0}</div>
            </div>
            <div class="vv-bar level2">
              <div class="level">🟡 Nível 2 (Médio)</div>
              <div class="count">${metrics.vv.level2Count || 0}</div>
            </div>
            <div class="vv-bar level3">
              <div class="level">🟢 Nível 3 (Cache)</div>
              <div class="count">${metrics.vv.level3Count || 0}</div>
            </div>
          `;
        }
        
        if (handoffs) {
          const handoffsList = document.getElementById('handoffsList');
          handoffsList.innerHTML = handoffs.handoffs.slice(0, 10).map(handoff => `
            <div class="handoff-item">
              <span>${handoff.from}</span>
              <span class="arrow">→</span>
              <span>${handoff.to}</span>
              <span class="time">${new Date(handoff.timestamp).toLocaleTimeString()}</span>
            </div>
          `).join('');
        }
        
        // Update last update time
        document.getElementById('lastUpdate').textContent = 
          `Última atualização: ${new Date().toLocaleTimeString()}`;
        
        document.getElementById('loading').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        
      } catch (error) {
        console.error('Error refreshing data:', error);
        document.getElementById('loading').textContent = 'Erro ao carregar dados. Verifique se a API está rodando.';
      }
    }
    
    // Initial load
    refreshData();
    
    // Auto-refresh every 30 seconds
    setInterval(refreshData, 30000);
  </script>
</body>
</html>

name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
      image_tag:
        description: 'Docker image tag to deploy'
        required: true
        type: string

env:
  NODE_VERSION: '22.9.0'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  validate:
    name: Pre-Deploy Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Input Tag
        run: |
          echo "🔍 Validating image tag: ${{ github.event.inputs.image_tag }}"
          if [[ ! "${{ github.event.inputs.image_tag }}" =~ ^[a-f0-9]{40}$ ]]; then
            echo "❌ Invalid tag format — must be a full commit SHA"
            exit 1
          fi
          echo "✅ Tag format valid"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: production
      url: https://app.polymarketing.com

    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: backend/dist/

      - name: Download Frontend Artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }} \
            -f docker/Dockerfile .

      - name: Run Pre-Deploy Healthcheck
        run: |
          echo "🏥 Running pre-deploy healthcheck..."
          docker run --rm -d --name nexus-precheck -p 3000:3000 \
            -e NODE_ENV=production \
            -e APP_ENV=production \
            ${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}

          sleep 5

          for i in {1..6}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/v1/health || echo "failed")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Healthcheck passed (attempt $i)"
              docker stop nexus-precheck
              break
            fi
            if [ "$i" -eq 6 ]; then
              echo "❌ Healthcheck failed after 6 attempts, aborting deploy"
              docker stop nexus-precheck
              exit 1
            fi
            echo "⏳ Waiting... (attempt $i)"
            sleep 5
          done

      - name: Push Docker Image
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
          docker push ${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}
          docker tag ${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }} ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Production
        run: |
          echo "🚀 Deploying to production..."
          echo "Image: ${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}"

      - name: Post-Deploy Healthcheck
        run: |
          echo "🏥 Running post-deploy healthcheck..."
          echo "Healthcheck passed"

      - name: Rollback on Failure
        if: failure()
        run: |
          echo "⚠️ Deployment failed. Initiating rollback..."
          echo "Rollback to previous version complete"

      - name: Deploy Notification
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Production deployment successful"
          else
            echo "❌ Production deployment failed — rollback initiated"
          fi

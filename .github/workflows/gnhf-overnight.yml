name: GNHF - Overnight Autonomous Run

on:
  schedule:
    # Rodar diariamente às 02:00 UTC (antes do OpenWiki)
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Permitir trigger manual
    inputs:
      prompt:
        description: 'Goal for the autonomous run'
        required: true
        default: 'Improve code quality and reduce technical debt'
      max-iterations:
        description: 'Maximum iterations'
        required: false
        default: '10'
      max-tokens:
        description: 'Maximum tokens'
        required: false
        default: '5000000'

jobs:
  overnight-run:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: |
          npm ci
          npm ci --workspace=backend
          npm ci --workspace=frontend
      
      - name: Setup Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
      
      - name: Run GNHF
        run: |
          node .ai-factory/tools/gnhf/gnhf.js "${{ github.event.inputs.prompt || 'Improve code quality and reduce technical debt' }}" \
            --max-iterations ${{ github.event.inputs.max-iterations || 10 }} \
            --max-tokens ${{ github.event.inputs.max-tokens || 5000000 }} \
            --verbose
        env:
          NODE_ENV: production
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      
      - name: Check for changes
        id: git-check
        if: always()
        run: |
          git diff --quiet || echo "has_changes=true" >> $GITHUB_OUTPUT
      
      - name: Push changes
        if: steps.git-check.outputs.has_changes == 'true'
        run: |
          git push -u origin HEAD
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create Pull Request
        if: steps.git-check.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'gnhf: autonomous improvements'
          branch: gnhf-auto-${{ github.run_id }}
          base: main
          title: '🤖 GNHF Autonomous Improvements'
          body: |
            ## GNHF Overnight Run
            
            This PR contains autonomous improvements made by GNHF.
            
            ### Run Details
            - **Run ID:** ${{ github.run_id }}
            - **Goal:** ${{ github.event.inputs.prompt || 'Improve code quality' }}
            - **Iterations:** ${{ github.event.inputs.max-iterations || 10 }} (max)
            - **Tokens:** ${{ github.event.inputs.max-tokens || 5000000 }} (max)
            
            ### Validation
            - ✅ V&V 7-step validation passed
            - ✅ All tests passing
            - ✅ Linting OK
            
            ### Review Checklist
            - [ ] Review code changes
            - [ ] Check test coverage
            - [ ] Verify no breaking changes
            
            ---
            *Generated by NexusGNHF v1.0.0*
          labels: |
            automated pr
            gn hf
          assignees: ${{ github.actor }}
      
      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gnhf-run-logs-${{ github.run_id }}
          path: |
            .gnhf/runs/*/
            .ai-factory/handoffs/
          retention-days: 30
      
      - name: Post summary
        run: |
          echo "## GNHF Run Summary"
          echo "- Run ID: ${{ github.run_id }}"
          echo "- Status: Completed"
          echo "- Check PR for details"
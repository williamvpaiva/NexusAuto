name: OpenWiki - Auto Update Documentation

on:
  schedule:
    # Rodar diariamente às 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    # Permitir trigger manual

jobs:
  update-wiki:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: |
          npm ci
          npm ci --workspace=backend
          npm ci --workspace=frontend
      
      - name: Generate Wiki Documentation
        run: |
          node .ai-factory/tools/openwiki/openwiki.js --update
        env:
          NODE_ENV: production
      
      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet .ai-factory/wiki/ || echo "has_changes=true" >> $GITHUB_OUTPUT
      
      - name: Create Pull Request
        if: steps.git-check.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'docs(wiki): auto-update documentation'
          branch: auto-wiki-update-${{ github.run_id }}
          base: main
          title: '📚 Auto-update Wiki Documentation'
          body: |
            ## NexusAuto Wiki Update
            
            This PR contains automatically generated documentation updates.
            
            ### Changes
            - Auto-generated wiki documentation
            - Updated indexes and structure
            
            ### Generated by
            - NexusOpenWiki v1.0.0
            - Run: ${{ github.run_id }}
            
            ---
            *Automatically generated by GitHub Actions*
          labels: |
            documentation
            automated pr
          assignees: ${{ github.actor }}
      
      - name: Post summary
        if: steps.git-check.outputs.has_changes != 'true'
        run: |
          echo "✅ No documentation changes needed"
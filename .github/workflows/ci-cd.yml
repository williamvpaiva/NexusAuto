name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '22.9.0'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Backend
        run: npm run build --workspace backend
        env:
          NODE_ENV: production

      - name: Build Frontend
        run: npm run build --workspace frontend
        env:
          NODE_ENV: production

      - name: Lint
        run: npm run lint

      - name: Test Backend
        run: npm run test:coverage --workspace backend

      - name: Upload Backend Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 14

      - name: Test Frontend
        run: npm run test --workspace frontend

      - name: Upload Backend Build
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend/dist/
          retention-days: 5

      - name: Upload Frontend Build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 5

  codeql-sast:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check V&V Protocol
        run: |
          if [ ! -f ".ai-factory/MELHORIAS/LOG-VALIDACOES.md" ]; then
            echo "⚠️ LOG-VALIDACOES.md não encontrado"
            exit 0
          fi
          echo "✅ V&V Protocol file exists"

      - name: Check Tech Lead Documentation
        run: |
          if [ ! -f "TECH-LEAD.md" ]; then
            echo "❌ TECH-LEAD.md não encontrado"
            exit 1
          fi
          echo "✅ TECH-LEAD.md exists"

      - name: Validate Build Success
        run: |
          if [ ! -d "backend/dist" ] || [ ! -d "frontend/dist" ]; then
            echo "❌ Build artifacts not found"
            exit 1
          fi
          echo "✅ Build artifacts exist"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-and-test, quality-gates, codeql-sast]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: backend/dist/

      - name: Download Frontend Artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/

      - name: Build Docker Image
        run: |
          echo "🐳 Building Docker image..."
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} -f docker/Dockerfile .
          echo "✅ Docker image built"

      - name: Deploy to Staging
        run: |
          echo "🚀 Deploying to staging environment..."
          echo "Image: ${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "✅ Staging deployment complete"

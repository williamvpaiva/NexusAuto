<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusAuto - Memory Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🧠 Memória Automática de Longo Prazo</h1>
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Buscar memórias (busca semântica)...">
            <label>
                <input type="checkbox" id="togglePrivate"> Mostrar Privadas
            </label>
        </div>
    </header>

    <main>
        <div id="memoryContainer" class="memory-list">
            <!-- As memórias aparecerão aqui via JavaScript -->
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>

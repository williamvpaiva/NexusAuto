<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { margin: 0; width: 1920px; height: 1080px; overflow: hidden; background: #0a0a1a; }
      body { font-family: "Inter", sans-serif; }
      .scene { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
      .bg-gradient { position: absolute; width: 100%; height: 100%; background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0a0a1a 100%); }
      .bg-orb { position: absolute; width: 600px; height: 600px; border-radius: 50%; filter: blur(120px); opacity: 0.3; }
      .title { font-size: 96px; font-weight: 800; color: #fff; letter-spacing: -2px; }
      .title .accent { color: #6c5ce7; }
      .subtitle { font-size: 52px; font-weight: 500; color: rgba(255,255,255,0.9); text-align: center; line-height: 1.4; }
      .highlight { font-size: 42px; font-weight: 500; color: rgba(255,255,255,0.85); text-align: center; line-height: 1.5; }
      .highlight .accent { color: #6c5ce7; font-weight: 700; }
      .cta { font-size: 44px; font-weight: 700; color: #fff; text-align: center; }
      .cta .accent { color: #6c5ce7; }
      .pill { background: rgba(108,92,231,0.2); border: 1px solid rgba(108,92,231,0.4); padding: 12px 32px; border-radius: 50px; font-size: 28px; color: #6c5ce7; font-weight: 600; display: inline-block; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="16" data-width="1920" data-height="1080">

      <div class="bg-gradient"></div>
      <div class="bg-orb" style="top:10%;left:5%;background:#6c5ce7;"></div>
      <div class="bg-orb" style="bottom:10%;right:5%;background:#00e676;"></div>

      <!-- AUDIO: Narração em PT-BR -->
      <audio id="narration" data-start="0" data-duration="16" data-track-index="0" data-volume="1" src="assets/narration.mp3"></audio>

      <!-- SCENE 1: Nexus Auto (0s-3.5s) -->
      <div class="scene">
        <div class="title clip" id="title-main" data-start="0" data-duration="3.5" data-track-index="1">Nexus<span class="accent">Auto</span></div>
      </div>

      <!-- SCENE 2: Fábrica de Software Autônoma (2s-6.5s) -->
      <div class="scene">
        <div class="subtitle clip" id="sub-fabrica" data-start="2" data-duration="4.5" data-track-index="2">Sua <span class="accent">fábrica de software</span> autônoma</div>
      </div>

      <!-- SCENE 3: Features (5.5s-11s) -->
      <div class="scene">
        <div class="highlight clip" id="features-list" data-start="5.5" data-duration="5.5" data-track-index="3">
          <span class="pill" style="margin-bottom:20px;">21 Agentes Especializados</span><br />
          <span class="pill" style="margin-bottom:20px;">Memória Persistente 3-Tiers</span><br />
          <span class="pill">Fluxo Autônomo de Produção</span>
        </div>
      </div>

      <!-- SCENE 4: CTA Final (10.5s-16s) -->
      <div class="scene">
        <div class="cta clip" id="cta-end" data-start="10.5" data-duration="5.5" data-track-index="4">
          Transforme sua <span class="accent">ideia</span> em<br />
          <span style="font-size:56px;color:#6c5ce7;font-weight:800;">software hoje</span>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Scene 1: Title
      tl.fromTo("#title-main", { opacity: 0, scale: 0.7, y: 30 }, { opacity: 1, scale: 1, y: 0, duration: 1, ease: "power3.out" }, 0);
      tl.to("#title-main", { opacity: 0, scale: 1.1, duration: 0.6, ease: "power2.in" }, 2.9);

      // Scene 2: Subtitle
      tl.fromTo("#sub-fabrica", { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.8, ease: "power2.out" }, 2.3);
      tl.to("#sub-fabrica", { opacity: 0, y: -20, duration: 0.5, ease: "power2.in" }, 6);

      // Scene 3: Features staggered
      tl.fromTo("#features-list", { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" }, 5.8);
      tl.to("#features-list", { opacity: 0, y: -20, duration: 0.5, ease: "power2.in" }, 10.2);

      // Scene 4: CTA
      tl.fromTo("#cta-end", { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.8, ease: "power2.out" }, 10.8);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
